<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#8E1728">
  <title>学習範囲を選ぶ</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="../css/theme.css">
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/components.css">

  <style>
    .range-section {
      padding: var(--space-4) var(--space-4) var(--space-3);
    }

    .range-section__title {
      font-size: var(--font-size-base);
      font-weight: 700;
      margin-bottom: var(--space-3);
      color: var(--color-text);
    }

    .range-section__hint {
      font-size: var(--font-size-xs);
      color: var(--color-text-sub);
      margin-top: var(--space-2);
    }

    /* 開始ボタン：画面下部に固定 */
    .start-action {
      position: sticky;
      bottom: 0;
      background-color: var(--color-bg);
      padding: var(--space-4);
      border-top: 1px solid var(--color-border);
      margin-top: var(--space-4);
    }

    .start-summary {
      font-size: var(--font-size-xs);
      color: var(--color-text-sub);
      text-align: center;
      margin-bottom: var(--space-3);
    }

    .start-summary strong {
      color: var(--color-primary);
      font-weight: 700;
    }

    /* モード表示 */
    .mode-indicator {
      display: inline-flex;
      align-items: center;
      gap: var(--space-2);
      padding: var(--space-2) var(--space-3);
      background-color: var(--color-primary-50);
      color: var(--color-primary);
      border-radius: var(--radius-full);
      font-size: var(--font-size-sm);
      font-weight: 700;
    }
  </style>
</head>
<body>
  <div class="app-container">
    <main class="main-content">

      <header class="app-header">
        <button class="app-header__back" onclick="history.back()">‹</button>
        <h1 class="app-header__title">学習範囲を選ぶ</h1>
      </header>

      <!-- モード表示 -->
      <div class="range-section">
        <div class="mode-indicator" id="modeIndicator">
          <span>📖</span>
          <span id="modeName">カードめくりモード</span>
        </div>
      </div>

      <!-- カテゴリ選択 -->
      <section class="range-section">
        <h2 class="range-section__title">カテゴリ</h2>
        <div class="choice-group">
          <button class="choice-chip choice-chip--selected" data-cat="all">すべて</button>
          <button class="choice-chip" data-cat="financial_accounting">財務会計</button>
          <button class="choice-chip" data-cat="management_accounting">管理会計</button>
          <button class="choice-chip" data-cat="audit_governance">監査・ガバナンス</button>
          <button class="choice-chip" data-cat="common">共通用語</button>
        </div>
        <p class="range-section__hint">複数選択できます</p>
      </section>

      <!-- 難易度選択 -->
      <section class="range-section">
        <h2 class="range-section__title">難易度</h2>
        <div class="choice-group">
          <button class="choice-chip choice-chip--selected" data-level="all">すべて</button>
          <button class="choice-chip" data-level="easy">やさしい</button>
          <button class="choice-chip" data-level="normal">ふつう</button>
          <button class="choice-chip" data-level="hard">むずかしい</button>
        </div>
      </section>

      <!-- 問題数選択 -->
      <section class="range-section">
        <h2 class="range-section__title">問題数</h2>
        <div class="choice-group">
          <button class="choice-chip" data-count="10">10問</button>
          <button class="choice-chip choice-chip--selected" data-count="20">20問</button>
          <button class="choice-chip" data-count="50">50問</button>
          <button class="choice-chip" data-count="all">すべて</button>
        </div>
      </section>

      <!-- 開始ボタン -->
      <div class="start-action">
        <p class="start-summary">
          <strong>20語</strong>で<strong id="summaryMode">カードめくり</strong>を始めます
        </p>
        <button class="btn btn--primary btn--block btn--lg" onclick="startLearning()">
          学習を開始する
        </button>
      </div>

    </main>
  </div>

  <script>
    // URLパラメータからモードを取得
    const urlParams = new URLSearchParams(window.location.search);
    const mode = urlParams.get('mode') || 'card';

    const modeConfig = {
      card: { name: 'カードめくりモード', icon: '📖', short: 'カードめくり', page: 'learn-card.html' },
      quiz: { name: '4択クイズモード', icon: '✓', short: '4択クイズ', page: 'learn-quiz.html' },
      input: { name: 'スペル並べモード', icon: '🔤', short: 'スペル並べ', page: 'learn-input.html' }
    };

    const config = modeConfig[mode] || modeConfig.card;
    document.getElementById('modeName').textContent = config.name;
    document.getElementById('summaryMode').textContent = config.short;
    document.querySelector('.mode-indicator span:first-child').textContent = config.icon;

    // チップの選択切り替え
    document.querySelectorAll('.choice-chip').forEach(chip => {
      chip.addEventListener('click', () => {
        // 同じグループ内で他を非選択にする（ラジオボタン的挙動）
        // ただし「カテゴリ」と「難易度」は将来的に複数選択にしたいので、ここではすべての選択を許容
        const isAllInGroup = chip.parentElement.querySelector('[data-cat="all"], [data-level="all"], [data-count]');

        // カウントは1つだけ選べる
        if (chip.dataset.count) {
          chip.parentElement.querySelectorAll('.choice-chip').forEach(c => c.classList.remove('choice-chip--selected'));
          chip.classList.add('choice-chip--selected');
          return;
        }

        // 「すべて」を押したら他を解除
        if (chip.dataset.cat === 'all' || chip.dataset.level === 'all') {
          chip.parentElement.querySelectorAll('.choice-chip').forEach(c => c.classList.remove('choice-chip--selected'));
          chip.classList.add('choice-chip--selected');
          return;
        }

        // 「すべて」以外を押したら、「すべて」を解除
        const allChip = chip.parentElement.querySelector('[data-cat="all"], [data-level="all"]');
        if (allChip) allChip.classList.remove('choice-chip--selected');

        // トグル
        chip.classList.toggle('choice-chip--selected');

        // すべて未選択になったら「すべて」を選択
        const anySelected = chip.parentElement.querySelectorAll('.choice-chip--selected').length > 0;
        if (!anySelected && allChip) allChip.classList.add('choice-chip--selected');
      });
    });

    function startLearning() {
      window.location.href = config.page;
    }
  </script>
</body>
</html>
