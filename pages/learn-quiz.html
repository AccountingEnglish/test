<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#8E1728">
  <title>4択クイズ</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="../css/theme.css">
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/components.css">

  <style>
    .learn-progress {
      padding: var(--space-3) var(--space-4);
      background-color: var(--color-bg);
      border-bottom: 1px solid var(--color-border);
    }

    .learn-progress__header {
      display: flex;
      justify-content: space-between;
      font-size: var(--font-size-xs);
      color: var(--color-text-sub);
      margin-bottom: var(--space-2);
    }

    /* 問題エリア */
    .quiz-question {
      padding: var(--space-6) var(--space-4) var(--space-5);
      text-align: center;
    }

    .quiz-question__label {
      font-size: var(--font-size-sm);
      color: var(--color-text-sub);
      margin-bottom: var(--space-4);
    }

    .quiz-question__word {
      font-size: var(--font-size-xxl);
      font-weight: 800;
      color: var(--color-text);
      line-height: 1.2;
      letter-spacing: -0.02em;
      margin-bottom: var(--space-3);
    }

    .quiz-question__meta {
      display: flex;
      justify-content: center;
      gap: var(--space-2);
    }

    /* 選択肢 */
    .quiz-options {
      padding: 0 var(--space-4);
      display: flex;
      flex-direction: column;
      gap: var(--space-3);
    }

    .quiz-option {
      width: 100%;
      padding: var(--space-4) var(--space-5);
      background-color: var(--color-bg-elevated);
      border: 1.5px solid var(--color-border);
      border-radius: var(--radius-md);
      font-size: var(--font-size-base);
      font-weight: 500;
      color: var(--color-text);
      cursor: pointer;
      font-family: var(--font-base);
      text-align: left;
      transition: all var(--transition-fast);
      min-height: 56px;
      display: flex;
      align-items: center;
      gap: var(--space-3);
    }

    .quiz-option__number {
      flex-shrink: 0;
      width: 28px;
      height: 28px;
      border-radius: var(--radius-full);
      background-color: var(--color-bg);
      border: 1.5px solid var(--color-border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: var(--font-size-sm);
      font-weight: 700;
      color: var(--color-text-sub);
    }

    .quiz-option:active {
      transform: scale(0.98);
    }

    /* 正解時 */
    .quiz-option--correct {
      background-color: var(--color-success-light);
      border-color: var(--color-success);
      color: var(--color-success);
      font-weight: 700;
    }

    .quiz-option--correct .quiz-option__number {
      background-color: var(--color-success);
      border-color: var(--color-success);
      color: white;
    }

    /* 不正解時 */
    .quiz-option--incorrect {
      background-color: var(--color-error-light);
      border-color: var(--color-error);
      color: var(--color-error);
    }

    .quiz-option--incorrect .quiz-option__number {
      background-color: var(--color-error);
      border-color: var(--color-error);
      color: white;
    }

    /* フィードバック表示 */
    .quiz-feedback {
      margin: var(--space-5) var(--space-4) 0;
      padding: var(--space-4);
      border-radius: var(--radius-md);
      display: none;
    }

    .quiz-feedback--show {
      display: block;
    }

    .quiz-feedback--correct {
      background-color: var(--color-success-light);
      border: 1px solid var(--color-success);
      color: var(--color-success);
    }

    .quiz-feedback--incorrect {
      background-color: var(--color-warning-light);
      border: 1px solid var(--color-warning);
      color: var(--color-warning);
    }

    .quiz-feedback__title {
      font-size: var(--font-size-md);
      font-weight: 800;
      margin-bottom: var(--space-2);
    }

    .quiz-feedback__detail {
      font-size: var(--font-size-sm);
      color: var(--color-text);
      line-height: 1.6;
    }

    .quiz-feedback__detail strong {
      color: var(--color-primary);
      font-weight: 700;
    }

    /* 次へボタン */
    .next-action {
      position: sticky;
      bottom: 0;
      background-color: var(--color-bg);
      padding: var(--space-4);
      margin-top: var(--space-5);
      display: none;
    }

    .next-action--show {
      display: block;
    }
  </style>
</head>
<body>
  <div class="app-container">
    <main class="main-content">

      <header class="app-header">
        <button class="app-header__back" onclick="history.back()">‹</button>
        <h1 class="app-header__title">4択クイズ</h1>
      </header>

      <!-- 進捗 -->
      <div class="learn-progress">
        <div class="learn-progress__header">
          <span>5 / 20</span>
          <span>正解 4 / 不正解 0</span>
        </div>
        <div class="progress-bar">
          <div class="progress-bar__fill" style="width: 25%;"></div>
        </div>
      </div>

      <!-- 問題 -->
      <div class="quiz-question">
        <p class="quiz-question__label">この英単語の意味は？</p>
        <h2 class="quiz-question__word">Goodwill</h2>
        <div class="quiz-question__meta">
          <span class="badge badge--primary">財務会計</span>
          <span class="badge">基礎</span>
        </div>
      </div>

      <!-- 選択肢 -->
      <div class="quiz-options">
        <button class="quiz-option" onclick="selectAnswer(this, false)">
          <span class="quiz-option__number">1</span>
          <span>株式の市場価値</span>
        </button>
        <button class="quiz-option quiz-option--correct" onclick="selectAnswer(this, true)" id="correctOption">
          <span class="quiz-option__number">2</span>
          <span>のれん</span>
        </button>
        <button class="quiz-option" onclick="selectAnswer(this, false)">
          <span class="quiz-option__number">3</span>
          <span>無形固定資産</span>
        </button>
        <button class="quiz-option" onclick="selectAnswer(this, false)">
          <span class="quiz-option__number">4</span>
          <span>株主資本</span>
        </button>
      </div>

      <!-- フィードバック -->
      <div class="quiz-feedback quiz-feedback--correct quiz-feedback--show" id="feedback">
        <div class="quiz-feedback__title">✓ 正解</div>
        <div class="quiz-feedback__detail">
          <strong>Goodwill</strong>: のれん<br>
          企業買収時に発生する超過収益力。買収価格と被買収企業の純資産時価との差額として認識される。
        </div>
      </div>

      <!-- 次へ -->
      <div class="next-action next-action--show">
        <button class="btn btn--primary btn--block btn--lg">次の問題へ</button>
      </div>

    </main>
  </div>

  <script>
    // この画面はワイヤーフレーム用：正解時のフィードバックを最初から表示している
    function selectAnswer(btn, isCorrect) {
      // ダミー処理：次の問題へ進む想定
    }
  </script>
</body>
</html>
