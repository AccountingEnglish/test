<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#8E1728">
  <title>スペル並べ</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="../css/theme.css">
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/components.css">

  <style>
    .learn-progress {
      padding: var(--space-3) var(--space-4);
      background-color: var(--color-bg);
      border-bottom: 1px solid var(--color-border);
    }

    .learn-progress__header {
      display: flex;
      justify-content: space-between;
      font-size: var(--font-size-xs);
      color: var(--color-text-sub);
      margin-bottom: var(--space-2);
    }

    /* 問題エリア */
    .input-question {
      padding: var(--space-5) var(--space-4) var(--space-3);
      text-align: center;
    }

    .input-question__label {
      font-size: var(--font-size-sm);
      color: var(--color-text-sub);
      margin-bottom: var(--space-3);
    }

    .input-question__japanese {
      font-size: var(--font-size-xl);
      font-weight: 800;
      color: var(--color-primary);
      margin-bottom: var(--space-3);
      letter-spacing: -0.01em;
    }

    .input-question__meta {
      display: flex;
      justify-content: center;
      gap: var(--space-2);
      margin-bottom: var(--space-2);
    }

    .input-question__hint {
      font-size: var(--font-size-xs);
      color: var(--color-text-mute);
    }

    /* 入力エリア */
    .input-area {
      margin: var(--space-4) var(--space-4);
      min-height: 80px;
      background-color: var(--color-bg-elevated);
      border-radius: var(--radius-md);
      border: 2px dashed var(--color-border-strong);
      padding: var(--space-3);
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: var(--space-1);
      justify-content: center;
      font-size: var(--font-size-md);
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    .input-area--filled {
      border-style: solid;
      border-color: var(--color-primary);
      background-color: var(--color-primary-50);
    }

    .input-slot {
      display: inline-block;
      width: 28px;
      height: 36px;
      border-bottom: 2px solid var(--color-border-strong);
      text-align: center;
      line-height: 36px;
      color: var(--color-text);
      font-weight: 700;
    }

    .input-slot--filled {
      border-bottom-color: var(--color-primary);
      color: var(--color-primary);
    }

    .input-slot--space {
      width: 16px;
      border-bottom: none;
    }

    /* 削除ボタン */
    .input-controls {
      padding: 0 var(--space-4);
      display: flex;
      justify-content: center;
      gap: var(--space-3);
      margin-bottom: var(--space-4);
    }

    .input-control-btn {
      padding: var(--space-2) var(--space-4);
      background-color: var(--color-bg-elevated);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-full);
      font-size: var(--font-size-xs);
      color: var(--color-text-sub);
      cursor: pointer;
      font-family: var(--font-base);
    }

    /* 文字パレット */
    .letter-palette {
      padding: var(--space-3) var(--space-4) var(--space-5);
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: var(--space-2);
    }

    .letter-tile {
      aspect-ratio: 1;
      background-color: var(--color-bg-elevated);
      border: 1.5px solid var(--color-border);
      border-radius: var(--radius-md);
      font-size: var(--font-size-md);
      font-weight: 800;
      color: var(--color-text);
      cursor: pointer;
      font-family: var(--font-base);
      transition: all var(--transition-fast);
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
      -webkit-user-select: none;
    }

    .letter-tile:active {
      background-color: var(--color-primary);
      color: white;
      border-color: var(--color-primary);
      transform: scale(0.94);
    }

    .letter-tile--used {
      opacity: 0.3;
      pointer-events: none;
    }

    /* 確認ボタン */
    .check-action {
      position: sticky;
      bottom: 0;
      background-color: var(--color-bg);
      padding: var(--space-4);
      border-top: 1px solid var(--color-border);
    }

    .check-action__hint {
      text-align: center;
      font-size: var(--font-size-xs);
      color: var(--color-text-mute);
      margin-bottom: var(--space-3);
    }
  </style>
</head>
<body>
  <div class="app-container">
    <main class="main-content">

      <header class="app-header">
        <button class="app-header__back" onclick="history.back()">‹</button>
        <h1 class="app-header__title">スペル並べ</h1>
      </header>

      <!-- 進捗 -->
      <div class="learn-progress">
        <div class="learn-progress__header">
          <span>3 / 20</span>
          <span>正解 2 / 不正解 0</span>
        </div>
        <div class="progress-bar">
          <div class="progress-bar__fill" style="width: 15%;"></div>
        </div>
      </div>

      <!-- 問題 -->
      <div class="input-question">
        <p class="input-question__label">この日本語訳に対応する英単語は？</p>
        <h2 class="input-question__japanese">減価償却</h2>
        <div class="input-question__meta">
          <span class="badge badge--primary">財務会計</span>
          <span class="badge">基礎</span>
        </div>
        <p class="input-question__hint">12文字</p>
      </div>

      <!-- 入力エリア -->
      <div class="input-area input-area--filled" id="inputArea">
        <span class="input-slot input-slot--filled">d</span>
        <span class="input-slot input-slot--filled">e</span>
        <span class="input-slot input-slot--filled">p</span>
        <span class="input-slot input-slot--filled">r</span>
        <span class="input-slot input-slot--filled">e</span>
        <span class="input-slot"></span>
        <span class="input-slot"></span>
        <span class="input-slot"></span>
        <span class="input-slot"></span>
        <span class="input-slot"></span>
        <span class="input-slot"></span>
        <span class="input-slot"></span>
      </div>

      <!-- 操作ボタン -->
      <div class="input-controls">
        <button class="input-control-btn">⌫ 1文字削除</button>
        <button class="input-control-btn">↺ クリア</button>
      </div>

      <!-- 文字パレット -->
      <div class="letter-palette">
        <button class="letter-tile letter-tile--used">d</button>
        <button class="letter-tile letter-tile--used">e</button>
        <button class="letter-tile letter-tile--used">p</button>
        <button class="letter-tile letter-tile--used">r</button>
        <button class="letter-tile letter-tile--used">e</button>
        <button class="letter-tile">c</button>
        <button class="letter-tile">i</button>
        <button class="letter-tile">a</button>
        <button class="letter-tile">t</button>
        <button class="letter-tile">i</button>
        <button class="letter-tile">o</button>
        <button class="letter-tile">n</button>
        <button class="letter-tile">x</button>
        <button class="letter-tile">y</button>
        <button class="letter-tile">z</button>
      </div>

      <!-- 確認ボタン -->
      <div class="check-action">
        <p class="check-action__hint">残り 7 文字</p>
        <button class="btn btn--primary btn--block btn--lg" disabled style="opacity: 0.5;">解答する</button>
      </div>

    </main>
  </div>
</body>
</html>
