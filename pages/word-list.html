<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#8E1728">
  <title>単語一覧</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="../css/theme.css">
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/components.css">

  <style>
    .search-bar {
      padding: var(--space-3) var(--space-4);
      background-color: var(--color-bg);
      border-bottom: 1px solid var(--color-border);
      position: sticky;
      top: var(--header-height);
      z-index: 50;
    }

    .search-input {
      width: 100%;
      padding: var(--space-3) var(--space-4);
      background-color: var(--color-bg-elevated);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      font-size: var(--font-size-base);
      font-family: var(--font-base);
      color: var(--color-text);
      transition: border-color var(--transition-fast);
    }

    .search-input:focus {
      outline: none;
      border-color: var(--color-primary);
    }

    .filter-bar {
      padding: var(--space-3) var(--space-4);
      display: flex;
      gap: var(--space-2);
      overflow-x: auto;
      scrollbar-width: none;
      background-color: var(--color-bg);
    }
    .filter-bar::-webkit-scrollbar { display: none; }

    .filter-chip {
      flex-shrink: 0;
      padding: var(--space-2) var(--space-3);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-full);
      background-color: var(--color-bg-elevated);
      font-size: var(--font-size-xs);
      color: var(--color-text-sub);
      cursor: pointer;
      font-family: var(--font-base);
    }

    .filter-chip--active {
      background-color: var(--color-primary);
      color: white;
      border-color: var(--color-primary);
    }

    .word-list-toolbar {
      padding: var(--space-3) var(--space-4);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background-color: var(--color-bg);
      border-bottom: 1px solid var(--color-border);
      font-size: var(--font-size-sm);
    }

    .word-list-toolbar__count { color: var(--color-text-sub); }

    .word-list-toolbar__action {
      color: var(--color-primary);
      font-weight: 700;
      background: none;
      border: none;
      cursor: pointer;
      font-family: var(--font-base);
      font-size: var(--font-size-sm);
    }
    .word-list-toolbar__action:disabled {
      color: var(--color-text-mute);
      cursor: not-allowed;
    }

    .word-item {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      padding: var(--space-3) var(--space-4);
      background-color: var(--color-bg-elevated);
      border-bottom: 1px solid var(--color-border);
      cursor: pointer;
      transition: background-color var(--transition-fast);
    }
    .word-item:active { background-color: var(--color-bg); }

    .word-item__check {
      flex-shrink: 0;
      width: 20px; height: 20px;
      border: 1.5px solid var(--color-border-strong);
      border-radius: var(--radius-sm);
      background-color: var(--color-bg-elevated);
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
      color: white;
    }
    .word-item__check--checked {
      background-color: var(--color-primary);
      border-color: var(--color-primary);
    }

    .word-item__body { flex: 1; min-width: 0; }
    .word-item__english {
      font-size: var(--font-size-base);
      font-weight: 700;
      color: var(--color-text);
      margin-bottom: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .word-item__japanese {
      font-size: var(--font-size-sm);
      color: var(--color-text-sub);
    }
    .word-item__meta {
      display: flex;
      gap: var(--space-1);
      margin-top: 4px;
    }
    .word-item__meta .badge {
      font-size: 10px;
      padding: 1px 6px;
    }

    .word-item__status {
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 2px;
    }
    .word-item__status-dots {
      display: flex;
      gap: 2px;
    }
    .word-item__dot {
      width: 6px; height: 6px;
      border-radius: var(--radius-full);
      background-color: var(--color-border);
    }
    .word-item__dot--correct { background-color: var(--color-success); }
    .word-item__dot--incorrect { background-color: var(--color-error); }
    .word-item__status-label {
      font-size: 10px;
      color: var(--color-text-mute);
    }
    .word-item__status-label--mastered {
      color: var(--color-success);
      font-weight: 700;
    }

    .print-action-bar {
      position: fixed;
      bottom: var(--tab-bar-height);
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: var(--max-width-mobile);
      background-color: var(--color-primary);
      padding: var(--space-3) var(--space-4);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-3);
      z-index: 90;
      transition: transform var(--transition-fast);
    }
    .print-action-bar--hidden {
      transform: translate(-50%, 110%);
    }
    .print-action-bar__count {
      color: white;
      font-size: var(--font-size-sm);
      font-weight: 700;
    }
    .print-action-bar__btn {
      padding: var(--space-2) var(--space-4);
      background-color: white;
      color: var(--color-primary);
      border: none;
      border-radius: var(--radius-full);
      font-size: var(--font-size-sm);
      font-weight: 700;
      font-family: var(--font-base);
      cursor: pointer;
    }

    .loading-state, .empty-state-msg {
      text-align: center;
      padding: var(--space-7) var(--space-4);
      color: var(--color-text-sub);
      font-size: var(--font-size-sm);
    }
  </style>
</head>
<body>
  <div class="app-container">
    <main class="main-content">

      <header class="app-header">
        <button class="app-header__back" onclick="history.back()">‹</button>
        <h1 class="app-header__title">単語一覧</h1>
      </header>

      <div class="search-bar">
        <input type="text" class="search-input" id="searchInput" placeholder="🔍 英単語・日本語訳で検索">
      </div>

      <div class="filter-bar" id="filterBar"></div>

      <div class="word-list-toolbar">
        <span class="word-list-toolbar__count" id="toolbarCount">読み込み中...</span>
        <button class="word-list-toolbar__action" id="printBtn" disabled>印刷へ →</button>
      </div>

      <div class="word-list" id="wordList">
        <div class="loading-state">用語データを読み込んでいます...</div>
      </div>

    </main>

    <div class="print-action-bar print-action-bar--hidden" id="printBar">
      <span class="print-action-bar__count" id="selectedCount">0件選択中</span>
      <button class="print-action-bar__btn" id="goToPrintBtn">印刷プレビュー</button>
    </div>

    <nav class="tab-bar">
      <a href="../index.html" class="tab-bar__item">
        <span class="tab-bar__icon">⌂</span>
        <span>ホーム</span>
      </a>
      <a href="word-list.html" class="tab-bar__item tab-bar__item--active">
        <span class="tab-bar__icon">≡</span>
        <span>単語</span>
      </a>
      <a href="progress.html" class="tab-bar__item">
        <span class="tab-bar__icon">◔</span>
        <span>進捗</span>
      </a>
      <a href="settings.html" class="tab-bar__item">
        <span class="tab-bar__icon">⚙</span>
        <span>設定</span>
      </a>
    </nav>
  </div>

  <script src="../js/storage.js"></script>
  <script src="../js/words.js"></script>
  <script src="../js/progress.js"></script>
  <script src="../js/ui.js"></script>
  <script src="../js/word-list.js"></script>
</body>
</html>
